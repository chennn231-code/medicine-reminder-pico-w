<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>藥物提醒 Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      margin: 0;
      background: #f5f7fb;
      color: #222;
    }

    header {
      background: #1f3f73;
      color: white;
      padding: 24px;
      text-align: center;
    }

    main {
      max-width: 1000px;
      margin: 24px auto;
      padding: 0 16px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .number {
      font-size: 32px;
      font-weight: bold;
      color: #1f3f73;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #eee;
      text-align: left;
    }

    th {
      background: #1f3f73;
      color: white;
    }

    .ok {
      color: green;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <header>
    <h1>藥物提醒 Dashboard</h1>
    <p>Raspberry Pi Pico W 智慧吃藥提醒紀錄</p>
  </header>

  <main>
    <section class="cards">
      <div class="card">
        <h2>總紀錄筆數</h2>
        <div class="number" id="totalCount">0</div>
      </div>

      <div class="card">
        <h2>已完成服藥</h2>
        <div class="number" id="takenCount">0</div>
      </div>

      <div class="card">
        <h2>平均反應時間</h2>
        <div class="number" id="avgTime">0 秒</div>
      </div>
    </section>

    <table>
      <thead>
        <tr>
          <th>時間</th>
          <th>服藥狀態</th>
          <th>反應秒數</th>
          <th>藥品名稱</th>
        </tr>
      </thead>
      <tbody id="dataBody">
        <tr>
          <td colspan="4">資料載入中...</td>
        </tr>
      </tbody>
    </table>
  </main>

  <script>
  const SHEET_ID = "1t9AU9FsTS-aqfgNNj_zt7nREGgnEE-rTwNa-LnVZP_M";
  const SHEET_NAME = "工作表1";

  function loadData() {
    const oldScript = document.getElementById("sheet-data-script");
    if (oldScript) {
      oldScript.remove();
    }

    const script = document.createElement("script");
    script.id = "sheet-data-script";
    script.src =
      "https://docs.google.com/spreadsheets/d/" +
      SHEET_ID +
      "/gviz/tq?sheet=" +
      encodeURIComponent(SHEET_NAME) +
      "&tqx=responseHandler:handleSheetData&t=" +
      Date.now();

    document.body.appendChild(script);
  }

  function handleSheetData(response) {
    const tbody = document.getElementById("dataBody");
    tbody.innerHTML = "";

    if (!response || !response.table || !response.table.rows) {
      tbody.innerHTML = `
        <tr>
          <td colspan="4">資料讀取失敗，請確認 Google Sheets 是否已開放或發布。</td>
        </tr>
      `;
      return;
    }

    const rows = response.table.rows;

    const data = rows
      .map(row => {
        const cells = row.c || [];

        return {
          time: cells[0] ? (cells[0].f || cells[0].v || "") : "",
          status: cells[1] ? (cells[1].v || "") : "",
          duration: cells[2] ? (cells[2].v || "") : "",
          medName: cells[3] ? (cells[3].v || "") : ""
        };
      })
      .filter(item => item.status || item.duration || item.medName);

    let totalCount = data.length;
    let takenCount = 0;
    let totalDuration = 0;
    let durationCount = 0;

    data.reverse().forEach(item => {
      if (String(item.status).includes("已吃藥")) {
        takenCount++;
      }

      const durationNumber = parseInt(item.duration);
      if (!isNaN(durationNumber)) {
        totalDuration += durationNumber;
        durationCount++;
      }

      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${item.time}</td>
        <td class="ok">${item.status}</td>
        <td>${item.duration} 秒</td>
        <td>${item.medName}</td>
      `;
      tbody.appendChild(tr);
    });

    document.getElementById("totalCount").textContent = totalCount;
    document.getElementById("takenCount").textContent = takenCount;

    const avg = durationCount > 0 ? Math.round(totalDuration / durationCount) : 0;
    document.getElementById("avgTime").textContent = avg + " 秒";

    if (totalCount === 0) {
      tbody.innerHTML = `
        <tr>
          <td colspan="4">目前沒有完整資料，請確認 Google Sheets 第 B～D 欄有資料。</td>
        </tr>
      `;
    }
  }

  loadData();
  setInterval(loadData, 30000);
</script>
</body>
</html>
